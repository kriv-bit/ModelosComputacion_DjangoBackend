services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  web:
    build: .
    # Ya NO exponemos el puerto 8000 al exterior, solo internamente para Nginx
    expose:
      - "8000"
    volumes:
      # Montamos solo la carpeta de archivos estáticos y media si queremos persistencia
      - static_volume:/app/staticfiles # STATIC_ROOT debe apuntar aquí
      - media_volume:/app/media # MEDIA_ROOT (opcional)
    environment:
      DB_ENGINE: postgresql
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${APP_DB_USER}
      DB_PASSWORD: ${APP_DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
  nginx:
    image: nginx:alpine
    ports:
      - "80:80" # Puerto HTTP estándar (cambiar a 443 con SSL)
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro # Sirve estáticos recolectados
      - media_volume:/app/media:ro # Sirve archivos subidos por usuarios
    depends_on:
      - web
    networks:
      - app-network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  app-network:
    driver: bridge
