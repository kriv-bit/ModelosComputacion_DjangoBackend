upstream django_app {
    server web:8000;   # El nombre del servicio web en docker-compose
}

server {
    listen 80;
    server_name _;   # Cambia por tu dominio real

    # Redirige todo a HTTPS (si tienes SSL, descomenta)
    # return 301 https://$server_name$request_uri;

    # Archivos estáticos (CSS, JS, imágenes del admin)
    location /static/ {
        alias /app/staticfiles/;
    }

    # Archivos subidos por usuarios (media)
    location /media/ {
        alias /app/media/;
    }

    # Todo lo demás lo pasa a Gunicorn (Django)
    location / {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
